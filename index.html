<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mathélyo Favre-Réguillon | Portfolio</title>

<style>
:root{
  --bg:#f4f1ef;
  --text:#171717;
  --muted:#5f5f5f;
  --red:#d60000;
  --card:#ffffff;
  --shadow:0 20px 60px rgba(0,0,0,.08);
  --radius:28px;
  --max:1200px;
  --nav-bg: rgba(210, 204, 200, 0.96);
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter, system-ui;
  background:var(--bg);
  color:var(--text);
}

.container{
  width:min(var(--max), calc(100% - 2rem));
  margin:auto;
}

/* NAVBAR */
.nav{
  position:sticky;
  top:0;
  background:var(--nav-bg);
  z-index:1000;
}

.nav-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:1.2rem 0;
}

.nav-links{
  display:flex;
  gap:1.4rem;
}

.nav-links a,
.dropdown-toggle{
  font-weight:700; /* 🔥 FIX PROJECT BOLD */
  cursor:pointer;
}

/* DROPDOWN */
.dropdown{position:relative;}

.dropdown-menu{
  display:none;
  position:absolute;
  background:#fff;
  padding:.5rem;
  border-radius:12px;
}

.dropdown.open .dropdown-menu{
  display:block;
}

/* HERO */
.intro{
  min-height:100vh;
  display:flex;
  align-items:center;
}

.intro-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:2rem;
}

.btn{
  background:var(--red);
  color:white;
  padding:1rem 1.6rem; /* 🔥 bigger */
  border-radius:999px;
  font-weight:800;
  font-size:1.05rem; /* 🔥 FIX SIZE */
}

/* ABOUT */
.timeline{
  margin-top:2rem;
}

.timeline-item{
  display:grid;
  grid-template-columns:1fr auto;
  align-items:center;
  margin-bottom:1.5rem;
}

.timeline-content{
  max-width:none; /* 🔥 FULL WIDTH TEXT */
}

.timeline-logo{
  justify-self:end; /* 🔥 RIGHT ALIGN */
}

.timeline-logo-box{
  width:120px;
  display:flex;
  justify-content:flex-end; /* 🔥 PUSH RIGHT */
}

/* SKILLS */
.skills{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:1rem;
}

/* FOOTER */
.section{padding:2rem 0;}

</style>
</head>

<body>

<!-- NAV -->
<nav class="nav">
  <div class="container nav-inner">
    <div>Mathélyo Favre-Réguillon</div>

    <div class="nav-links">
      <a href="#about">About</a>
      <a href="#racing">EPFL Racing</a>

      <div class="dropdown" id="projectsDropdown">
        <button class="dropdown-toggle" onclick="toggleDropdown(event)">
          Projects ▾
        </button>

        <div class="dropdown-menu">
          <a href="#">Monocoque</a>
          <a href="#">Screw sorter</a>
        </div>
      </div>

      <a href="#skills">Skills</a>
      <a href="#contact">Contact</a>
    </div>
  </div>
</nav>

<!-- HERO -->
<header class="intro">
  <div class="container intro-grid">

    <div>
      <h1>Design.<br>Build.<br>Deliver.</h1>

      <button class="btn">Discover my profile</button>
    </div>

    <img src="photos/ImagePresentation.jpg" style="width:350px;">
  </div>
</header>

<!-- ABOUT -->
<section id="about" class="section">
  <div class="container">

    <h2>About Me</h2>

    <p style="width:100%;"> <!-- 🔥 FIX WIDTH -->
      My academic journey...
    </p>

    <div class="timeline">

      <div class="timeline-item">
        <div class="timeline-content">
          <strong>2018-2021</strong>
          <p>High school</p>
        </div>
        <div class="timeline-logo">
          <div class="timeline-logo-box">
            <img src="logos/highschool.png">
          </div>
        </div>
      </div>

      <div class="timeline-item">
        <div class="timeline-content">
          <strong>2021-2024</strong>
          <p>EPFL Bachelor</p>
        </div>
        <div class="timeline-logo">
          <div class="timeline-logo-box">
            <img src="logos/epfl.png">
          </div>
        </div>
      </div>

    </div>
  </div>
</section>

<!-- RACING -->
<section id="racing" class="section">
  <div class="container">
    <h2>EPFL Racing</h2>
  </div>
</section>

<!-- PROJECTS -->
<section id="projects" class="section">
  <div class="container">
    <h2>Projects</h2>
  </div>
</section>

<!-- 🔥 SKILLS MOVED HERE -->
<section id="skills" class="section">
  <div class="container">
    <h2>Skills</h2>

    <div class="skills">
      <div>Problem solving</div>
      <div>Teamwork</div>
      <div>Curiosity</div>
    </div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="section">
  <div class="container">
    <h2>Contact</h2>
  </div>
</section>

<script>
function toggleDropdown(e){
  e.stopPropagation();
  document.getElementById("projectsDropdown").classList.toggle("open");
}
</script>

</body>
</html>
